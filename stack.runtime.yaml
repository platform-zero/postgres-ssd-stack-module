---
schemaVersion: 1
module: "postgres-ssd"
target: "core"
services:
  postgres-ssd:
    image: "timescale/timescaledb@sha256:0af03ecf697825f6ddae76fd275d16bf46007bed6d00eb3d754779cb7db96fa6"
    containerName: "postgres-ssd"
    lifecycle: "daemon"
    updatePolicy: "pinned"
    placement: "rootful"
    environment:
      POSTGRES_USER: "${POSTGRES_ADMIN_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_ADMIN_PASSWORD}"
      POSTGRES_DB: "postgres"
      POSTGRES_AGENT_PASSWORD: "${POSTGRES_AGENT_PASSWORD}"
      POSTGRES_FORGEJO_PASSWORD: "${POSTGRES_FORGEJO_PASSWORD}"
      POSTGRES_OPENWEBUI_PASSWORD: "${POSTGRES_OPENWEBUI_PASSWORD}"
      POSTGRES_MASTODON_PASSWORD: "${POSTGRES_MASTODON_PASSWORD}"
      POSTGRES_PIPELINE_PASSWORD: "${POSTGRES_PIPELINE_PASSWORD}"
      POSTGRES_AIRFLOW_PASSWORD: "${POSTGRES_AIRFLOW_PASSWORD}"
      POSTGRES_TEST_RUNNER_PASSWORD: "${POSTGRES_TEST_RUNNER_PASSWORD}"
    networks:
    - "postgres"
    volumes:
    - "postgres_ssd_data:/var/lib/postgresql/data"
    - "./configs/postgres/ssd-entrypoint.sh:/ssd-entrypoint.sh:ro"
    - "./configs/postgres/ssd-bootstrap-common.sh:/docker-entrypoint-initdb.d/00-ssd-bootstrap-common.sh:ro"
    - "./configs/postgres/init-ssd-db.sh:/docker-entrypoint-initdb.d/01-init-ssd-db.sh:ro"
    health:
      test:
      - "CMD-SHELL"
      - "pg_isready -U ${POSTGRES_ADMIN_USER} -t 1 && \\\npsql -U ${POSTGRES_ADMIN_USER}\
        \ -d postgres -t -c 'SELECT 1' > /dev/null\n"
      interval: "5s"
      timeout: "5s"
      retries: 24
      start_period: "20s"
    command: "postgres -c 'max_connections=200' -c 'shared_buffers=1GB' -c 'max_worker_processes=24'\
      \ -c 'max_parallel_workers=8' -c 'timescaledb.max_background_workers=8'"
    entrypoint:
    - "/ssd-entrypoint.sh"
    restart: "unless-stopped"
    resources:
      limits:
        memory: "8G"
        cpus: "2.0"
  postgres-ssd-bootstrap:
    image: "timescale/timescaledb@sha256:0af03ecf697825f6ddae76fd275d16bf46007bed6d00eb3d754779cb7db96fa6"
    containerName: "postgres-ssd-bootstrap"
    lifecycle: "daemon"
    updatePolicy: "pinned"
    placement: "rootful"
    dependencies:
      postgres-ssd: "healthy"
    environment:
      POSTGRES_HOST: "postgres-ssd"
      POSTGRES_PORT: 5432
      POSTGRES_USER: "${POSTGRES_ADMIN_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_ADMIN_PASSWORD}"
      POSTGRES_DB: "postgres"
      POSTGRES_AGENT_PASSWORD: "${POSTGRES_AGENT_PASSWORD}"
      POSTGRES_FORGEJO_PASSWORD: "${POSTGRES_FORGEJO_PASSWORD}"
      POSTGRES_OPENWEBUI_PASSWORD: "${POSTGRES_OPENWEBUI_PASSWORD}"
      POSTGRES_MASTODON_PASSWORD: "${POSTGRES_MASTODON_PASSWORD}"
      POSTGRES_PIPELINE_PASSWORD: "${POSTGRES_PIPELINE_PASSWORD}"
      POSTGRES_AIRFLOW_PASSWORD: "${POSTGRES_AIRFLOW_PASSWORD}"
      POSTGRES_TEST_RUNNER_PASSWORD: "${POSTGRES_TEST_RUNNER_PASSWORD}"
      PGPASSWORD: "${POSTGRES_ADMIN_PASSWORD}"
    networks:
    - "postgres"
    volumes:
    - "./configs/postgres/ensure-ssd-users.sh:/ensure-ssd-users.sh:ro"
    - "./configs/postgres/ssd-bootstrap-common.sh:/ensure-ssd-bootstrap-common.sh:ro"
    entrypoint:
    - "/bin/bash"
    - "/ensure-ssd-users.sh"
    restart: "on-failure"
networks: {}
volumes:
  postgres_ssd_data:
    hostPath: "${PG_SSD_ROOT}/postgres-ssd"
    rootlessStrategy: "copy"
